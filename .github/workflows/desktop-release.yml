name: Desktop Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-desktop:
    name: build-${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: macOS-arm64
            target_arch: arm64
            arch_label: arm64
          - os: macos-13
            asset: macOS-x64
            target_arch: x86_64
            arch_label: x64
          - os: windows-latest
            asset: windows-x64
            target_arch: ""
            arch_label: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller

      - name: Build desktop package
        env:
          VOXA_TARGET_ARCH: ${{ matrix.target_arch }}
          VOXA_ARCH_LABEL: ${{ matrix.arch_label }}
        run: python desktop/build.py

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.asset }}
          path: dist/release/*

      - name: Upload assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
